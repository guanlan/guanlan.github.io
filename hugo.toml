baseURL = 'https://rmmod.com/'
languageCode = 'en-us'
title = 'Guanlan Dai'
theme = 'LoveIt'

enableEmoji = true

[params]
  defaultTheme = "auto"
  dateFormat = "2006-01-02"
  rss = true

  [params.author]
    name = "Guanlan Dai"

  [params.home]
    rss = 10

    [params.home.profile]
      enable = true
      gravatarEmail = "hackertian@gmail.com"
      avatarURL = ""
      title = "Guanlan Dai"
      subtitle = ""
      typeit = true
      social = true
      disclaimer = ""

    [params.home.posts]
      enable = true
      paginate = 6

  [params.app]
    title = "Guanlan Dai"
    svgFavicon = "/favicon.svg"
    themeColor = "#0f172a"
    iconColor = "#67e8f9"

  [params.header]
    desktopMode = "fixed"
    mobileMode = "auto"

    [params.header.title]
      name = "Guanlan Dai"

  [params.footer]
    enable = true
    hugo = false
    custom = "Guanlan Dai | CC BY-NC 4.0"
    copyright = true 
    author = true 
    since = 2009

  [params.social]
    GitHub = "guanlan"
    Linkedin = "guanlandai"
    RSS = true
    Twitter = "guanlandai"
    Instagram = ""

  [params.page]
    lightgallery = true

    [params.page.seo.publisher]
      name = "Guanlan Dai"

[menu]
  [[menu.main]]
    weight = 1
    identifier = "home"
    name = "Home"
    url = "/"
  [[menu.main]]
    weight = 2
    identifier = "about"
    name = "About"
    url = "/about/"

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    lineNumbersInTable = true
    # LoveIt 主题要求必须设置为 false
    noClasses = false
